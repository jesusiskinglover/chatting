<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Conversations">
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
          </div>
          <div>
            <h1>Pulse</h1>
            <p>Chat together</p>
          </div>
        </div>

        <div class="profile-card">
          <div class="avatar self">MO</div>
          <div>
            <strong>Michael</strong>
            <span>Online now</span>
          </div>
          <div class="presence-dot" aria-label="Online"></div>
        </div>

        <div class="search-wrap">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
          </svg>
          <input id="searchInput" type="search" placeholder="Search chats" />
        </div>

        <div class="quick-actions">
          <button id="newDmBtn" class="action-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14M5 12h14" />
            </svg>
            Direct message
          </button>
          <button id="newGroupBtn" class="action-button secondary" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            New group
          </button>
        </div>

        <div class="section-heading">
          <span>Messages</span>
          <button id="joinGroupBtn" class="text-button" type="button">Join group</button>
        </div>
        <div id="conversationList" class="conversation-list"></div>
      </aside>

      <section class="chat-panel" aria-label="Active conversation">
        <header class="chat-header">
          <button id="menuBtn" class="icon-button mobile-only" type="button" aria-label="Show conversations">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <div id="activeAvatar" class="avatar lg">AO</div>
          <div class="chat-title">
            <div>
              <h2 id="activeName">Ari Ortega</h2>
              <p id="activeStatus">Active 2m ago</p>
            </div>
          </div>
          <div class="header-actions">
            <button class="icon-button" type="button" aria-label="Start call">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.35 1.9.66 2.79a2 2 0 0 1-.45 2.11L8.05 9.9a16 16 0 0 0 6.05 6.05l1.27-1.27a2 2 0 0 1 2.11-.45c.9.31 1.83.53 2.79.66A2 2 0 0 1 22 16.92Z" />
              </svg>
            </button>
            <button class="icon-button" type="button" aria-label="Conversation details">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 16v-4M12 8h.01M22 12a10 10 0 1 1-20 0 10 10 0 0 1 20 0Z" />
              </svg>
            </button>
          </div>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="messageForm" class="composer">
          <button class="icon-button" type="button" aria-label="Attach file">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.2-9.19a4 4 0 1 1 5.65 5.66l-9.2 9.19a2 2 0 1 1-2.82-2.83l8.48-8.48" />
            </svg>
          </button>
          <input id="messageInput" autocomplete="off" placeholder="Write a message..." />
          <button class="send-button" type="submit">
            <span>Send</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m22 2-7 20-4-9-9-4 20-7Z" />
            </svg>
          </button>
        </form>
      </section>

      <aside class="details-panel" aria-label="Chat details">
        <div class="details-card">
          <div id="detailsAvatar" class="avatar xl">AO</div>
          <h3 id="detailsName">Ari Ortega</h3>
          <p id="detailsMeta">Design partner</p>
          <div id="detailsStats" class="stats-row"></div>
        </div>

        <div class="panel-section">
          <div class="section-heading compact">
            <span>Members</span>
            <button id="addMemberBtn" class="text-button" type="button">Add</button>
          </div>
          <div id="memberList" class="member-list"></div>
        </div>

        <div class="panel-section">
          <div class="section-heading compact">
            <span>Shared</span>
          </div>
          <div class="shared-list">
            <div>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z" />
                <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" />
              </svg>
              <span>Project notes</span>
            </div>
            <div>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z" />
                <path d="M14 2v4a2 2 0 0 0 2 2h4M10 9H8M16 13H8M16 17H8" />
              </svg>
              <span>Chat recap</span>
            </div>
          </div>
        </div>
      </aside>
    </main>

    <dialog id="chatDialog" class="modal">
      <form id="dialogForm" method="dialog">
        <div class="modal-header">
          <div>
            <h2 id="dialogTitle">New chat</h2>
            <p id="dialogSubtitle">Start a direct message or group.</p>
          </div>
          <button id="closeDialogBtn" class="icon-button" type="button" aria-label="Close dialog">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
        <label>
          <span id="nameLabel">Name</span>
          <input id="dialogName" required maxlength="32" />
        </label>
        <label id="membersField">
          <span>Members</span>
          <input id="dialogMembers" placeholder="Maya, Jordan, Sam" />
        </label>
        <label id="codeField">
          <span>Invite code</span>
          <input id="dialogCode" placeholder="PULSE-247" />
        </label>
        <div class="modal-actions">
          <button id="cancelDialogBtn" class="ghost-button" type="button">Cancel</button>
          <button id="submitDialogBtn" class="send-button" type="submit">Create</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
